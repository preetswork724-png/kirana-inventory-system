<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="/style.css"> <!-- ✅ fixed path -->
</head>
<body>

<div class="container">
    <h2>Login</h2>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <button class="secondary" onclick="goRegister()">Register</button>
</div>

<script>
    function goRegister() {
        window.location.href = "register.html";
    }
</script>

<script src="/script.js"></script> <!-- ✅ fixed path -->

</body>
</html>
